<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Frames Creator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #F4F1EB;
  font-family: 'Helvetica Neue', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  gap: 14px;
}
h1 {
  font-size: 13px;
  letter-spacing: 0.2em;
  color: #53504B;
  font-weight: 400;
  text-transform: uppercase;
}
.hint {
  font-size: 11px;
  color: #53504B;
  opacity: 0.6;
  letter-spacing: 0.05em;
  text-align: center;
  line-height: 1.8;
}
#canvas-wrap {
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  line-height: 0;
  position: relative; /* needed for absolute overlays */
  transition: outline 0.1s;
}
#canvas-wrap.drag-over { outline: 3px solid #D10101; }
canvas { display: block; }

/* Transparent file input overlays – iOS-compatible */
.zone-overlay {
  position: absolute;
  cursor: pointer;
  opacity: 0;
  overflow: hidden;
}
.zone-overlay input[type=file] {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  opacity: 0;
  cursor: pointer;
  font-size: 100px; /* prevents iOS zoom on focus */
}

/* Delete / replace button per zone */
.zone-del {
  position: absolute;
  display: none;
  width: 22px; height: 22px;
  background: rgba(0,0,0,0.55);
  color: white;
  border: none;
  border-radius: 50%;
  font-size: 13px;
  line-height: 22px;
  text-align: center;
  cursor: pointer;
  z-index: 10;
  padding: 0;
  font-family: inherit;
}

#controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  align-items: center;
}
button {
  border: none;
  padding: 11px 22px;
  font-size: 11px;
  letter-spacing: 0.15em;
  cursor: pointer;
  text-transform: uppercase;
  font-family: inherit;
}
#exportBtn { background: #D10101; color: white; }
#exportBtn:hover { background: #a80000; }
#resetBtn { background: #53504B; color: white; }
#resetBtn:hover { background: #3a3835; }

.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: #53504B;
  text-transform: uppercase;
  cursor: pointer;
  user-select: none;
}
.toggle {
  width: 36px; height: 20px;
  background: #C5C1BB;
  border-radius: 10px;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle.on { background: #53504B; }
.toggle::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  background: white;
  border-radius: 50%;
  top: 3px; left: 3px;
  transition: left 0.2s;
}
.toggle.on::after { left: 19px; }

.color-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: #53504B;
  text-transform: uppercase;
}
.color-btn {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
}
.color-btn.active { border-color: #D10101; }
.color-btn.white  { background: #ffffff; box-shadow: 0 0 0 1px #C5C1BB; }
.color-btn.black  { background: #000000; }

#loading {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(244,241,235,0.88);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  font-size: 12px;
  letter-spacing: 0.15em;
  color: #53504B;
  text-transform: uppercase;
}
#loading.show { display: flex; }

/* Export-Vorschau Overlay */
#export-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 20px;
}
#export-overlay.show { display: flex; }
#export-overlay img {
  max-width: 100%;
  max-height: 70vh;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
#export-overlay .hint-save {
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-align: center;
}
#export-overlay .btn-row {
  display: flex;
  gap: 10px;
}
#closeExport { background: #53504B; color: white; }
#downloadBtn { background: #D10101; color: white; }
.spinner {
  width: 28px; height: 28px;
  border: 2px solid #C5C1BB;
  border-top-color: #D10101;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<h1>Frames Creator &nbsp;·&nbsp; by Silvan Rapp</h1>
<div class="hint">
  Foto ins Feld tippen oder reinziehen &nbsp;·&nbsp; Ziehen zum Verschieben &nbsp;·&nbsp; Scroll / Pinch zum Zoomen
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <!-- Overlays werden per JS positioniert -->
</div>

<div id="controls">
  <button id="exportBtn">↓ Export PNG</button>
  <button id="resetBtn">Reset</button>
  <label class="toggle-wrap">
    <div class="toggle on" id="borderToggle"></div>
    Rahmen
  </label>
  <div class="color-wrap">
    Farbe
    <button class="color-btn white active" id="colorWhite"></button>
    <button class="color-btn black"        id="colorBlack"></button>
  </div>
</div>

<div id="loading"><div class="spinner"></div>Exportiere…</div>

<div id="export-overlay">
  <img id="export-img" src="" alt="Export">
  <div class="hint-save" id="export-hint"></div>
  <div class="btn-row">
    <button id="downloadBtn">↓ Download</button>
    <button id="closeExport">Schließen</button>
  </div>
</div>

<script>
const W = 1080, H = 1350, HALF = 675;
const FW = 380, FH = 300;
const FX = (W - FW) / 2;
const FY_TOP = (HALF - FH) / 2;
const FY_BOT = HALF + FY_TOP;
const BORD = 6;
let showBorder  = true;
let borderColor = '#ffffff';

const DSCALE = Math.min(0.5, (window.innerHeight - 180) / H);
const DPR    = window.devicePixelRatio || 1;

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = Math.round(W * DSCALE * DPR);
canvas.height = Math.round(H * DSCALE * DPR);
canvas.style.width  = Math.round(W * DSCALE) + 'px';
canvas.style.height = Math.round(H * DSCALE) + 'px';

const zones = [
  { id:'bg_top',    rect:{x:0,  y:0,      w:W,  h:HALF}, label:['FOTO A','Hintergrund oben'],  fill:'#C5C1BB', img:null, ox:0, oy:0, sc:1 },
  { id:'bg_bot',    rect:{x:0,  y:HALF,   w:W,  h:HALF}, label:['FOTO B','Hintergrund unten'], fill:'#B5B1AB', img:null, ox:0, oy:0, sc:1 },
  { id:'frame_top', rect:{x:FX, y:FY_TOP, w:FW, h:FH},   label:['FOTO B','Ausschnitt'],         fill:'#A5A19D', img:null, ox:0, oy:0, sc:1 },
  { id:'frame_bot', rect:{x:FX, y:FY_BOT, w:FW, h:FH},   label:['FOTO A','Ausschnitt'],         fill:'#989490', img:null, ox:0, oy:0, sc:1 },
];

// ── Transparente Overlays über jede Zone legen (iOS-Fix) ──────

const wrap = document.getElementById('canvas-wrap');

zones.forEach(z => {
  const r = z.rect;
  const div = document.createElement('div');
  div.className = 'zone-overlay';
  div.style.left   = Math.round(r.x * DSCALE) + 'px';
  div.style.top    = Math.round(r.y * DSCALE) + 'px';
  div.style.width  = Math.round(r.w * DSCALE) + 'px';
  div.style.height = Math.round(r.h * DSCALE) + 'px';

  const input = document.createElement('input');
  input.type   = 'file';
  input.accept = 'image/*';
  input.addEventListener('change', function() {
    if (this.files[0]) loadImage(this.files[0], z);
    this.value = '';
  });

  div.appendChild(input);
  wrap.appendChild(div);
  z.overlay = div;

  // × Delete-Button oben rechts der Zone
  const del = document.createElement('button');
  del.className = 'zone-del';
  del.textContent = '×';
  del.style.left = Math.round((r.x + r.w) * DSCALE - 26) + 'px';
  del.style.top  = Math.round(r.y * DSCALE + 4) + 'px';
  del.addEventListener('click', () => {
    z.img = null; z.ox = 0; z.oy = 0; z.sc = 1;
    del.style.display = 'none';
    z.overlay.style.pointerEvents = 'auto';
    redraw();
  });
  wrap.appendChild(del);
  z.delBtn = del;
});

// ── Rendering ─────────────────────────────────────────────────

function render(c2d, scale) {
  c2d.save();
  c2d.scale(scale, scale);
  c2d.fillStyle = '#F4F1EB';
  c2d.fillRect(0, 0, W, H);

  drawZone(c2d, zones[0], {x:0, y:0,    w:W, h:HALF});
  drawZone(c2d, zones[1], {x:0, y:HALF, w:W, h:HALF});


  if (showBorder) {
    c2d.fillStyle = borderColor;
    c2d.fillRect(FX-BORD, FY_TOP-BORD, FW+BORD*2, FH+BORD*2);
    c2d.fillRect(FX-BORD, FY_BOT-BORD, FW+BORD*2, FH+BORD*2);
  }

  drawZone(c2d, zones[2], zones[2].rect);
  drawZone(c2d, zones[3], zones[3].rect);
  c2d.restore();
}

function drawZone(c2d, zone, clip) {
  const {rect, img, ox, oy, sc, fill, label} = zone;
  c2d.save();
  c2d.beginPath();
  c2d.rect(clip.x, clip.y, clip.w, clip.h);
  c2d.clip();

  if (img) {
    const iw = img.naturalWidth  * sc;
    const ih = img.naturalHeight * sc;
    c2d.drawImage(img, rect.x+(rect.w-iw)/2+ox, rect.y+(rect.h-ih)/2+oy, iw, ih);
  } else {
    c2d.fillStyle = fill;
    c2d.fillRect(clip.x, clip.y, clip.w, clip.h);
    c2d.strokeStyle = 'rgba(0,0,0,0.07)';
    c2d.lineWidth = 1.5;
    c2d.beginPath();
    c2d.moveTo(clip.x,       clip.y);      c2d.lineTo(clip.x+clip.w, clip.y+clip.h);
    c2d.moveTo(clip.x+clip.w,clip.y);      c2d.lineTo(clip.x,        clip.y+clip.h);
    c2d.stroke();
    const cx = clip.x+clip.w/2, cy = clip.y+clip.h/2;
    c2d.textAlign='center'; c2d.textBaseline='middle';
    c2d.fillStyle='rgba(0,0,0,0.28)';
    c2d.font='bold 30px Helvetica Neue,sans-serif';
    label.forEach((line,i) => c2d.fillText(line, cx, cy+(i-(label.length-1)/2)*38-18));
    c2d.font='18px Helvetica Neue,sans-serif';
    c2d.fillStyle='rgba(0,0,0,0.16)';
    c2d.fillText('Tippen oder Foto reinziehen', cx, cy+28);
  }
  c2d.restore();
}

function redraw() { render(ctx, DSCALE*DPR); }
redraw();

// ── Hit detection ─────────────────────────────────────────────

function hitZone(ex, ey) {
  const x = ex/DSCALE, y = ey/DSCALE;
  for (let i=zones.length-1; i>=0; i--) {
    const r=zones[i].rect;
    if (x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h) return zones[i];
  }
  return null;
}

// ── Pan – Mouse ───────────────────────────────────────────────

let drag=null, lx=0, ly=0;

canvas.addEventListener('mousedown', e => {
  const z=hitZone(e.offsetX,e.offsetY);
  if (z&&z.img) { drag=z; lx=e.clientX; ly=e.clientY; }
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  drag.ox+=(e.clientX-lx)/DSCALE; drag.oy+=(e.clientY-ly)/DSCALE;
  lx=e.clientX; ly=e.clientY;
  canvas.style.cursor='grabbing';
  redraw();
});
window.addEventListener('mouseup', ()=>{ drag=null; canvas.style.cursor=''; });

// ── Pan + Pinch – Touch ───────────────────────────────────────

let touchZone=null, lastDist=0;

// Single-finger pan: nur wenn Touch direkt auf canvas landet (Overlay disabled)
canvas.addEventListener('touchstart', e=>{
  if (e.target !== canvas) return;
  if (e.touches.length === 1) {
    e.preventDefault();
    const t=e.touches[0];
    const br=canvas.getBoundingClientRect();
    const z=hitZone(t.clientX-br.left, t.clientY-br.top);
    if (z&&z.img) { drag=z; lx=t.clientX; ly=t.clientY; }
  }
},{passive:false});

canvas.addEventListener('touchmove', e=>{
  if (e.target !== canvas) return;
  if (e.touches.length===1&&drag) {
    e.preventDefault();
    const t=e.touches[0];
    drag.ox+=(t.clientX-lx)/DSCALE; drag.oy+=(t.clientY-ly)/DSCALE;
    lx=t.clientX; ly=t.clientY;
    redraw();
  }
},{passive:false});

canvas.addEventListener('touchend',()=>{ drag=null; },{passive:true});

// Zwei-Finger Pinch: auf wrap hören → funktioniert auch über Overlays
wrap.addEventListener('touchstart', e=>{
  if (e.touches.length === 2) {
    e.preventDefault();
    drag=null;
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    lastDist=Math.hypot(dx,dy);
    const br=canvas.getBoundingClientRect();
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-br.left;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2-br.top;
    touchZone=hitZone(mx,my);
  }
},{passive:false});

wrap.addEventListener('touchmove', e=>{
  if (e.touches.length===2&&touchZone&&touchZone.img) {
    e.preventDefault();
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.hypot(dx,dy);
    touchZone.sc=Math.max(0.05,Math.min(20,touchZone.sc*(dist/lastDist)));
    lastDist=dist;
    redraw();
  }
},{passive:false});

wrap.addEventListener('touchend',()=>{ touchZone=null; },{passive:true});

// ── Scroll zoom ───────────────────────────────────────────────

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const z=hitZone(e.offsetX,e.offsetY);
  if (!z||!z.img) return;
  z.sc=Math.max(0.05,Math.min(20,z.sc*(e.deltaY>0?0.93:1.07)));
  redraw();
},{passive:false});

// ── Drag & Drop ───────────────────────────────────────────────

canvas.addEventListener('dragover', e=>{e.preventDefault();wrap.classList.add('drag-over');});
canvas.addEventListener('dragleave',()=>wrap.classList.remove('drag-over'));
canvas.addEventListener('drop',e=>{
  e.preventDefault();
  wrap.classList.remove('drag-over');
  const z=hitZone(e.offsetX,e.offsetY);
  if (!z) return;
  const file=Array.from(e.dataTransfer.files).find(f=>f.type.startsWith('image/'));
  if (file) loadImage(file,z);
});

function loadImage(file,zone) {
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const r=zone.rect;
      zone.sc=Math.max(r.w/img.naturalWidth,r.h/img.naturalHeight);
      zone.ox=0; zone.oy=0; zone.img=img;
      zone.overlay.style.pointerEvents='none';
      zone.delBtn.style.display='block';
      redraw();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Export ────────────────────────────────────────────────────

const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);

document.getElementById('exportBtn').addEventListener('click',()=>{
  document.getElementById('loading').classList.add('show');
  setTimeout(()=>{
    const EX=3;
    const ec=document.createElement('canvas');
    ec.width=W*EX; ec.height=H*EX;
    const ectx=ec.getContext('2d');
    ectx.imageSmoothingEnabled=true;
    ectx.imageSmoothingQuality='high';
    render(ectx,EX);
    const dataURL=ec.toDataURL('image/png');
    document.getElementById('loading').classList.remove('show');

    // Vorschau-Overlay anzeigen
    const overlay=document.getElementById('export-overlay');
    document.getElementById('export-img').src=dataURL;
    document.getElementById('export-hint').textContent=
      isIOS ? 'Bild lang drücken → „Bild sichern" → Fotos App' : 'Rechtsklick → Bild speichern  oder  Download';
    document.getElementById('downloadBtn').style.display= isIOS ? 'none' : '';
    overlay.classList.add('show');

    document.getElementById('downloadBtn').onclick=()=>{
      const a=document.createElement('a');
      a.download='frames_post.png';
      a.href=dataURL;
      a.click();
    };
  },50);
});

document.getElementById('closeExport').addEventListener('click',()=>{
  document.getElementById('export-overlay').classList.remove('show');
  document.getElementById('export-img').src='';
});

// ── Border toggle ─────────────────────────────────────────────

document.getElementById('borderToggle').addEventListener('click',function(){
  showBorder=!showBorder;
  this.classList.toggle('on',showBorder);
  redraw();
});

// ── Border color ──────────────────────────────────────────────

document.getElementById('colorWhite').addEventListener('click',()=>{
  borderColor='#ffffff';
  document.getElementById('colorWhite').classList.add('active');
  document.getElementById('colorBlack').classList.remove('active');
  redraw();
});
document.getElementById('colorBlack').addEventListener('click',()=>{
  borderColor='#000000';
  document.getElementById('colorBlack').classList.add('active');
  document.getElementById('colorWhite').classList.remove('active');
  redraw();
});

// ── Reset ─────────────────────────────────────────────────────

document.getElementById('resetBtn').addEventListener('click',()=>{
  zones.forEach(z=>{
    z.img=null; z.ox=0; z.oy=0; z.sc=1;
    z.overlay.style.pointerEvents='auto';
    z.delBtn.style.display='none';
  });
  redraw();
});
</script>
</body>
</html>
